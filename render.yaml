services:
  - type: web
    name: cyclemaster-api
    runtime: python
    pythonVersion: 3.11
    plan: standard
    numInstances: 1
    
    # Build and Start Commands
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    
    # Environment Variables
    envVars:
      - key: DB_PATH
        value: /data/cyclemaster.db
      - key: PORT
        value: 8000
      - key: LOG_LEVEL
        value: INFO
    
    # Health Check
    healthCheckPath: /
    
    # Disk Configuration
    disk:
      - name: data
        mountPath: /data
        sizeGB: 1
